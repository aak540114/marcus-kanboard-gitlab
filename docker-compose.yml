# docker-compose.yml — LOCAL DEVELOPMENT / DEMO
#
# Runs the full stack — Kanboard + Gitea + Marcus — on a single machine.
# Not intended for production — use the individual compose files instead:
#
#   kanboard/docker-compose.yml  →  deploy Kanboard (e.g. Railway)
#   gitea/docker-compose.yml     →  deploy Gitea    (e.g. VPS / cloud VM)
#
# Quick start
# -----------
#   ./scripts/setup.sh
#
# That one script provisions everything (Kanboard project/columns/token/
# webhook, Gitea admin/token) and brings up all three containers with zero
# manual clicks except pasting your Claude API key. See scripts/setup.sh
# and README.md for what it does and how to run the steps manually if you
# ever need to.
#
# Gitea boots in seconds — a single lightweight Go binary with an embedded
# SQLite database, unlike GitLab CE's multi-minute Rails boot:
#   docker compose logs -f gitea | grep "Listen"
#
# The MarcusDevEnv plugin is bind-mounted from kanboard/plugins/ so any
# edits to the PHP templates take effect after a container restart:
#   docker compose restart kanboard
#
# Marcus's src/ is bind-mounted too, so a Python edit takes effect after:
#   docker compose restart marcus

services:
  kanboard:
    image: kanboard/kanboard:latest
    container_name: marcus-kanboard
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - kanboard_data:/var/www/app/data
      # Bind-mount the plugin from source so edits are immediately testable
      - ./kanboard/plugins:/var/www/app/plugins
    environment:
      # Browser-facing — embedded server-side into client-side fetch() URLs
      # by kanboard/plugins/MarcusDevEnv/Template/{board,task}/*.html.php
      # (Active Agents badge, Project Description link, Gate toggle). Must
      # be an address the user's own browser can resolve, NOT the Docker
      # service name "marcus" (unreachable from outside the compose
      # network). Tracks MARCUS_PORT so the host-published port stays in
      # sync if that's overridden.
      MARCUS_URL: "${MARCUS_URL:-http://localhost:${MARCUS_PORT:-4298}}"
      KANBOARD_WEBHOOK_TOKEN: "${KANBOARD_WEBHOOK_TOKEN:-}"
      # Sets the app-level JSON-RPC API token to a known value so
      # scripts/setup.sh can provision Kanboard without any UI login —
      # see app/Api/Middleware/AuthenticationMiddleware.php in Kanboard's
      # own source (auth as user "jsonrpc", password = this token).
      API_AUTHENTICATION_TOKEN: "${KANBOARD_API_TOKEN:-}"
      # Kanboard silently drops outbound webhook calls to private-network
      # URLs unless this is set — and http://marcus:4298/... (a sibling
      # Docker service name) counts as private. Required for the
      # auto-seeded webhook (see scripts/setup.sh) to actually fire.
      WEBHOOK_ALLOW_PRIVATE_NETWORKS: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  gitea:
    image: gitea/gitea:latest
    container_name: marcus-gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: "http://localhost:3000/"
      GITEA__service__DISABLE_REGISTRATION: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  marcus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marcus-server
    restart: unless-stopped
    depends_on:
      kanboard:
        condition: service_healthy
      gitea:
        condition: service_healthy
    ports:
      # MARCUS_BIND_HOST controls whether this port is reachable from
      # other machines: "127.0.0.1" (default, set by scripts/setup.sh
      # unless you opt in) publishes it to loopback only — unreachable
      # off this machine even though the container itself always binds
      # 0.0.0.0 internally (see docker/marcus.docker.config.json's
      # transport.http.host, required for Docker's own port-forwarding
      # to work at all). Set to "0.0.0.0" (or leave unset and let
      # scripts/setup.sh ask) to accept connections from AI agents on
      # other machines, e.g. a remote VPS deployment.
      - "${MARCUS_BIND_HOST:-127.0.0.1}:${MARCUS_PORT:-4298}:4298"
    volumes:
      # Bind-mount source for hot-reload-on-restart, matching the
      # kanboard plugin bind-mount convention above (editable install
      # picks up host edits after `docker compose restart marcus`).
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
      # CostStore opens ~/.marcus/costs.db (src/marcus_mcp/server.py);
      # container runs as root so $HOME=/root. Kept under ./data so all
      # Marcus state lives under one host directory.
      - ./data/.marcus:/root/.marcus
      # Only present/used when MARCUS_AI_PROVIDER=claude_subscription
      # (scripts/setup.sh's default when the host already has an
      # authenticated `claude` CLI — see its "AI provider" step). Shares
      # the host's existing `claude login` state into the container so
      # `claude -p` calls inside it use the same Claude Pro/Max
      # subscription, with no separate API key. Deliberately scoped to
      # just these two files (not the whole ~/.claude directory, which
      # also holds unrelated project session transcripts under
      # ~/.claude/projects). ${HOME} must be set in the shell that runs
      # `docker compose up` — scripts/setup.sh always has it; if you
      # invoke compose directly from an environment without it, either
      # export HOME or switch to MARCUS_AI_PROVIDER=anthropic.
      - ${HOME}/.claude.json:/root/.claude.json
      - ${HOME}/.claude/.credentials.json:/root/.claude/.credentials.json
    environment:
      # Container-to-container URLs use Docker service names, not
      # localhost. Note Kanboard listens on port 80 *inside* the compose
      # network — 8080 above is only the host-side port mapping.
      #
      # No KANBAN_PROVIDER here deliberately: docker/marcus.docker.config.json
      # already bakes "kanban": {"provider": "kanboard"} into the image, and
      # KanbanSettings.provider defaults to "sqlite" (a truthy string) —
      # kanban_factory.py's `config.kanban.provider or os.getenv(...)`
      # fallback only ever consults the env var when the config value is
      # falsy, which it never is here. Setting KANBAN_PROVIDER would be
      # silently ignored; the baked config file is the actual source of
      # truth for provider selection in this deployment.
      KANBOARD_URL: "http://kanboard/jsonrpc.php"
      KANBOARD_API_TOKEN: "${KANBOARD_API_TOKEN:-}"
      KANBOARD_PROJECT_ID: "${KANBOARD_PROJECT_ID:-1}"
      # Validates incoming webhook requests — see
      # src/core/kanboard_webhook_receiver.py. Must match the value seeded
      # into Kanboard's own webhook_token setting by scripts/setup.sh.
      KANBOARD_WEBHOOK_TOKEN: "${KANBOARD_WEBHOOK_TOKEN:-}"
      # GITEA_URL/GITEA_TOKEN: provisioned by scripts/setup.sh and correct,
      # but not yet consumed by anything in src/ — GiteaManager and
      # ProjectSyncWorkflow (src/integrations/gitea_manager.py,
      # src/workflows/project_sync_workflow.py) exist and are tested but
      # aren't instantiated by server.py yet. Setting these now is
      # forward-compatible with that wiring landing later; it is not a
      # currently-functioning feature. See README.md's Gitea integration
      # row for the full explanation.
      GITEA_URL: "http://gitea:3000"
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
      # Resolves docker/marcus.docker.config.json's "ai.provider" /
      # "ai.claude_cli_model" placeholders. scripts/setup.sh sets
      # MARCUS_AI_PROVIDER=claude_subscription in .env by default
      # (no CLAUDE_API_KEY prompt) when the host has an authenticated
      # `claude` CLI to mount in via the volumes above; it falls back to
      # "anthropic" only when CLAUDE_API_KEY is already set in .env, or
      # you can set MARCUS_AI_PROVIDER yourself to override either way.
      MARCUS_AI_PROVIDER: "${MARCUS_AI_PROVIDER:-claude_subscription}"
      MARCUS_CLAUDE_CLI_MODEL: "${MARCUS_CLAUDE_CLI_MODEL:-sonnet}"
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-}"
    healthcheck:
      # /mcp is a Streamable-HTTP JSON-RPC endpoint (POST-only) — a plain
      # `curl -f GET` would 4xx and falsely report unhealthy. A bare TCP
      # connect just confirms the process is up and bound to the port.
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 4298), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  kanboard_data:
  gitea_data:
