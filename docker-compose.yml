# docker-compose.yml — LOCAL DEVELOPMENT / DEMO
#
# Runs the full stack — Kanboard + Gitea + Marcus — on a single machine.
# Not intended for production — use the individual compose files instead:
#
#   kanboard/docker-compose.yml  →  deploy Kanboard (e.g. Railway)
#   gitea/docker-compose.yml     →  deploy Gitea    (e.g. VPS / cloud VM)
#
# Quick start
# -----------
#   ./scripts/setup.sh
#
# That one script provisions everything (Kanboard project/columns/token/
# webhook, Gitea admin/token) and brings up all three containers with zero
# manual clicks except pasting your Claude API key. See scripts/setup.sh
# and README.md for what it does and how to run the steps manually if you
# ever need to.
#
# Gitea boots in seconds — a single lightweight Go binary with an embedded
# SQLite database, unlike GitLab CE's multi-minute Rails boot:
#   docker compose logs -f gitea | grep "Listen"
#
# The MarcusDevEnv plugin is bind-mounted from kanboard/plugins/ so any
# edits to the PHP templates take effect after a container restart:
#   docker compose restart kanboard
#
# Marcus's src/ is bind-mounted too, so a Python edit takes effect after:
#   docker compose restart marcus

services:
  kanboard:
    image: kanboard/kanboard:latest
    container_name: marcus-kanboard
    restart: unless-stopped
    ports:
      # Its OWN gate (KANBOARD_BIND_HOST), NOT MARCUS_BIND_HOST — AI agents
      # never talk to Kanboard directly (Marcus reaches it over the internal
      # Docker network, KANBOARD_URL="http://kanboard/..." on the marcus
      # service below), only HUMANS need this port, to use Kanboard's UI.
      # scripts/setup.sh sets this to 0.0.0.0 together with MARCUS_BIND_HOST
      # whenever remote access is chosen (humans need to reach the board
      # remotely too, same as they need Gitea) — but ALSO replaces
      # Kanboard's admin/admin login first (see ensure_admin_user() in
      # provision_kanboard.py), since unlike KANBOARD_API_TOKEN, Kanboard's
      # JSON-RPC API has no method to rotate an existing user's password;
      # simply exposing the fixed default would defeat the point of the
      # bearer-token work done for Marcus itself. Defaults to localhost-only.
      - "${KANBOARD_BIND_HOST:-127.0.0.1}:8080:80"
    extra_hosts:
      # Lets this container reach a NATIVELY-run Marcus (hybrid mode —
      # see scripts/run_marcus_native.sh / README's "Hybrid mode" section)
      # via http://host.docker.internal:4298/... — Docker Desktop
      # (macOS/Windows) already resolves this name automatically; on
      # Linux it needs this explicit mapping. Harmless when Marcus runs
      # in Docker too (KANBOARD_WEBHOOK_TOKEN's webhook URL just isn't
      # set to this address in that mode).
      - "host.docker.internal:host-gateway"
    volumes:
      - kanboard_data:/var/www/app/data
      # Bind-mount the plugin from source so edits are immediately testable
      - ./kanboard/plugins:/var/www/app/plugins
    environment:
      # Browser-facing — embedded server-side into client-side fetch() URLs
      # by kanboard/plugins/MarcusDevEnv/Template/{board,task}/*.php
      # (Active Agents badge, Project Description link, Gate toggle). Must
      # be an address the user's own browser can resolve, NOT the Docker
      # service name "marcus" (unreachable from outside the compose
      # network). Tracks MARCUS_PORT so the host-published port stays in
      # sync if that's overridden.
      MARCUS_URL: "${MARCUS_URL:-http://localhost:${MARCUS_PORT:-4298}}"
      # Also browser-facing, same templates as MARCUS_URL: when
      # MARCUS_AGENT_TOKEN is set (remote-access mode), Marcus's
      # BearerAuthMiddleware gates every API route the plugin's widgets
      # call — the templates embed this token so the browser's fetch()
      # calls (Authorization header) and navigation links (?token= query
      # param) can authenticate. The plugin pages are only served to
      # logged-in Kanboard users, so this shares the secret with exactly
      # the humans already trusted to operate the board. Empty (the
      # localhost-only default) = auth disabled = templates omit it.
      MARCUS_AGENT_TOKEN: "${MARCUS_AGENT_TOKEN:-}"
      KANBOARD_WEBHOOK_TOKEN: "${KANBOARD_WEBHOOK_TOKEN:-}"
      # Sets the app-level JSON-RPC API token to a known value so
      # scripts/setup.sh can provision Kanboard without any UI login —
      # see app/Api/Middleware/AuthenticationMiddleware.php in Kanboard's
      # own source (auth as user "jsonrpc", password = this token).
      API_AUTHENTICATION_TOKEN: "${KANBOARD_API_TOKEN:-}"
      # Kanboard silently drops outbound webhook calls to private-network
      # URLs unless this is set — and http://marcus:4298/... (a sibling
      # Docker service name) counts as private. Required for the
      # auto-seeded webhook (see scripts/setup.sh) to actually fire.
      WEBHOOK_ALLOW_PRIVATE_NETWORKS: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  gitea:
    image: gitea/gitea:latest
    container_name: marcus-gitea
    restart: unless-stopped
    ports:
      # Its OWN gate (GITEA_BIND_HOST), NOT MARCUS_BIND_HOST — deliberately
      # decoupled. Unlike Kanboard, agents genuinely need Gitea reachable
      # (git clone/fetch/push on their assigned branch), so when remote
      # agents are allowed, Gitea's port must stay open EVEN in HTTPS mode,
      # where MARCUS_BIND_HOST gets pinned to 127.0.0.1 so only Caddy fronts
      # Marcus (see docker-compose.tls.yml) — Caddy does not proxy Gitea.
      # scripts/setup.sh sets GITEA_BIND_HOST=0.0.0.0 whenever remote access
      # is chosen, regardless of the HTTPS choice for Marcus. Defaults to
      # 127.0.0.1 (matches the "no remote access" case). GITEA_ADMIN_PASSWORD
      # is randomly generated by setup.sh — change it before real use if you
      # set your own.
      - "${GITEA_BIND_HOST:-127.0.0.1}:3000:3000"
      - "${GITEA_BIND_HOST:-127.0.0.1}:2222:22"
    extra_hosts:
      # See the identical mapping on the kanboard service above — this one
      # is what makes GITEA_WEBHOOK_TARGET_URL=http://host.docker.internal:...
      # (set by scripts/run_marcus_native.sh in hybrid mode) reachable.
      - "host.docker.internal:host-gateway"
    volumes:
      - gitea_data:/data
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: "http://localhost:3000/"
      GITEA__service__DISABLE_REGISTRATION: "true"
      # REQUIRED for the push webhook to ever be delivered. Gitea's
      # default webhook allow-list is "external" (public-internet hosts
      # only, an SSRF guard) — it silently refuses to dial private
      # addresses at DELIVERY time, while hook CREATION succeeds with no
      # error. Both of Marcus's webhook targets are private: the Docker
      # service name (http://marcus:4298/webhooks/gitea → a 172.x compose
      # network IP) and hybrid mode's host.docker.internal (host-gateway
      # → bridge IP, also private). Without this, "instant refresh" of
      # dev environments never fires and the only evidence is Gitea's
      # per-hook "Recent Deliveries" UI. Scoped to the [webhook] section
      # so migrations/other subsystems keep the stricter default.
      # Acceptable here: a single-admin local stack — only the admin can
      # define hooks, so the SSRF concern this default protects against
      # doesn't apply.
      GITEA__webhook__ALLOWED_HOST_LIST: "external,private,loopback"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  marcus:
    # Only started when explicitly requested (scripts/setup.sh passes
    # `--profile docker-marcus` for the "Marcus in Docker" run-mode
    # choice) — a bare `docker compose up -d` (e.g. after a reboot, when
    # you've chosen hybrid/native mode — see scripts/run_marcus_native.sh)
    # must NOT also try to build and start this container.
    profiles: ["docker-marcus"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marcus-server
    restart: unless-stopped
    depends_on:
      kanboard:
        condition: service_healthy
      gitea:
        condition: service_healthy
    ports:
      # MARCUS_BIND_HOST controls whether this port is reachable from
      # other machines: "127.0.0.1" (default, set by scripts/setup.sh
      # unless you opt in) publishes it to loopback only — unreachable
      # off this machine even though the container itself always binds
      # 0.0.0.0 internally (see docker/marcus.docker.config.json's
      # transport.http.host, required for Docker's own port-forwarding
      # to work at all). Set to "0.0.0.0" (or leave unset and let
      # scripts/setup.sh ask) to accept connections from AI agents on
      # other machines, e.g. a remote VPS deployment.
      - "${MARCUS_BIND_HOST:-127.0.0.1}:${MARCUS_PORT:-4298}:4298"
    volumes:
      # Bind-mount source for hot-reload-on-restart, matching the
      # kanboard plugin bind-mount convention above (editable install
      # picks up host edits after `docker compose restart marcus`).
      - ./src:/app/src
      - ./data:/app/data
      - ./logs:/app/logs
      # CostStore opens ~/.marcus/costs.db (src/marcus_mcp/server.py);
      # container runs as root so $HOME=/root. Kept under ./data so all
      # Marcus state lives under one host directory.
      - ./data/.marcus:/root/.marcus
      # Only present/used when MARCUS_AI_PROVIDER=claude_subscription
      # (scripts/setup.sh's default when the host already has an
      # authenticated `claude` CLI — see its "AI provider" step). Shares
      # the host's existing `claude login` state into the container so
      # `claude -p` calls inside it use the same Claude Pro/Max
      # subscription, with no separate API key. Deliberately scoped to
      # just these two files (not the whole ~/.claude directory, which
      # also holds unrelated project session transcripts under
      # ~/.claude/projects). The `${HOME:?...}` form makes compose FAIL
      # with that message if HOME is unset (e.g. a systemd/cron/CI
      # invocation), rather than silently expanding to "/.claude.json"
      # and mounting the wrong path — scripts/setup.sh always has HOME.
      #
      # These are the HOST's live credential files, mounted read-write
      # because the CLI needs to refresh its own OAuth token. Two
      # consequences worth knowing: (1) running interactive Claude Code on
      # the host at the same time as Marcus shares one login — a token
      # refresh on either side can momentarily invalidate the other; and
      # (2) macOS keeps the login token in the Keychain, NOT in
      # .credentials.json, so this mount does not carry it and the
      # provider won't authenticate inside Docker on a Mac host (use
      # CLAUDE_API_KEY / MARCUS_AI_PROVIDER=anthropic there). See README's
      # "AI provider" section.
      - ${HOME:?HOME must be set for the claude_subscription bind mounts; export HOME or set MARCUS_AI_PROVIDER=anthropic}/.claude.json:/root/.claude.json
      - ${HOME:?HOME must be set for the claude_subscription bind mounts; export HOME or set MARCUS_AI_PROVIDER=anthropic}/.claude/.credentials.json:/root/.claude/.credentials.json
      # Docker-outside-of-Docker: lets Marcus spawn SIBLING containers on
      # the HOST for per-ticket dev-environment previews
      # (src/core/dev_environment.py's "Open Dev Environment" button) by
      # talking to the HOST's Docker daemon directly, rather than running
      # a nested daemon inside this container.
      #
      # SECURITY NOTE: a process with access to docker.sock can trivially
      # escalate to full host root (e.g. `docker run -v /:/host ... chroot
      # /host`). This is an accepted, deliberate tradeoff for this local-
      # dev/demo stack, NOT something to enable on a shared or internet-
      # facing host without understanding that risk. The
      # `max_parallel_containers` Kanboard setting (see
      # src/core/dev_env_settings.py) limits how many sibling containers
      # can be spun up, but does not change this trust boundary — anyone
      # who can reach Marcus's HTTP port with MARCUS_AGENT_TOKEN can
      # already run arbitrary code as an agent, so this mount does not,
      # on its own, expand what an authenticated caller could already do.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Container-to-container URLs use Docker service names, not
      # localhost. Note Kanboard listens on port 80 *inside* the compose
      # network — 8080 above is only the host-side port mapping.
      #
      # No KANBAN_PROVIDER here deliberately: docker/marcus.docker.config.json
      # already bakes "kanban": {"provider": "kanboard"} into the image, and
      # KanbanSettings.provider defaults to "sqlite" (a truthy string) —
      # kanban_factory.py's `config.kanban.provider or os.getenv(...)`
      # fallback only ever consults the env var when the config value is
      # falsy, which it never is here. Setting KANBAN_PROVIDER would be
      # silently ignored; the baked config file is the actual source of
      # truth for provider selection in this deployment.
      KANBOARD_URL: "http://kanboard/jsonrpc.php"
      KANBOARD_API_TOKEN: "${KANBOARD_API_TOKEN:-}"
      KANBOARD_PROJECT_ID: "${KANBOARD_PROJECT_ID:-1}"
      # Validates incoming webhook requests — see
      # src/core/kanboard_webhook_receiver.py. Must match the value seeded
      # into Kanboard's own webhook_token setting by scripts/setup.sh.
      KANBOARD_WEBHOOK_TOKEN: "${KANBOARD_WEBHOOK_TOKEN:-}"
      # Shared bearer token every connecting AI agent must present as
      # `Authorization: Bearer <token>` (src/core/agent_auth.py). When set,
      # Marcus rejects unauthenticated requests to the MCP control plane and
      # the gate/description APIs with 401 — so only agents you've given the
      # token to can read or change tickets/branches/code. scripts/setup.sh
      # generates it when you opt into remote access. Empty = auth disabled
      # (fine for the localhost-only default; required before exposing).
      MARCUS_AGENT_TOKEN: "${MARCUS_AGENT_TOKEN:-}"
      # GITEA_URL/GITEA_TOKEN: provisioned by scripts/setup.sh. Read by
      # _wire_human_gated_workflow() in src/marcus_mcp/server.py at
      # startup to construct GiteaManager -> ProjectSyncWorkflow, so
      # tickets' projects get an auto-created Gitea repo (and, since
      # GITEA_WEBHOOK_TOKEN below is always set by scripts/setup.sh, a
      # push webhook too) the first time an agent calls get_work_context.
      GITEA_URL: "http://gitea:3000"
      GITEA_TOKEN: "${GITEA_TOKEN:-}"
      # Shared HMAC secret for the dev-environment instant-refresh webhook
      # (src/core/gitea_webhook_receiver.py, POST /webhooks/gitea).
      # scripts/setup.sh always generates this — no manual Gitea UI step
      # is needed to wire the webhook up; GiteaManager.create_webhook()
      # registers it automatically per repo. GITEA_WEBHOOK_TARGET_URL uses
      # the Docker service name (machine-to-machine, unlike MARCUS_URL
      # above which must be browser-resolvable) — only override it if
      # Marcus's HTTP route isn't reachable at http://marcus:4298 from the
      # Gitea container, e.g. a split multi-host deployment.
      GITEA_WEBHOOK_TOKEN: "${GITEA_WEBHOOK_TOKEN:-}"
      GITEA_WEBHOOK_TARGET_URL: "${GITEA_WEBHOOK_TARGET_URL:-http://marcus:4298/webhooks/gitea}"
      # See _resolve_host_repo_path() in src/core/dev_environment.py: a
      # `docker run -v` mount source Marcus constructs must be a HOST
      # filesystem path, since the docker.sock mount above makes `docker
      # run` reach the HOST's daemon directly (Docker-outside-of-Docker),
      # not a path inside Marcus's own container. ${PWD} is the host
      # shell's working directory at `docker compose up` time —
      # scripts/setup.sh always `cd`s to the repo root first, so this
      # reliably resolves to the repo root on the host.
      MARCUS_HOST_PROJECT_ROOT: "${PWD}"
      # Resolves docker/marcus.docker.config.json's "ai.provider" /
      # "ai.claude_cli_model" placeholders. scripts/setup.sh sets
      # MARCUS_AI_PROVIDER=claude_subscription in .env by default
      # (no CLAUDE_API_KEY prompt) when the host has an authenticated
      # `claude` CLI to mount in via the volumes above; it falls back to
      # "anthropic" only when CLAUDE_API_KEY is already set in .env, or
      # you can set MARCUS_AI_PROVIDER yourself to override either way.
      MARCUS_AI_PROVIDER: "${MARCUS_AI_PROVIDER:-claude_subscription}"
      MARCUS_CLAUDE_CLI_MODEL: "${MARCUS_CLAUDE_CLI_MODEL:-sonnet}"
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-}"
    healthcheck:
      # /mcp is a Streamable-HTTP JSON-RPC endpoint (POST-only) — a plain
      # `curl -f GET` would 4xx and falsely report unhealthy. A bare TCP
      # connect just confirms the process is up and bound to the port.
      test: ["CMD", "python3", "-c", "import socket; socket.create_connection(('localhost', 4298), 2).close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  kanboard_data:
  gitea_data:
