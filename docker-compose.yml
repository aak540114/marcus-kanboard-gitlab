# docker-compose.yml — LOCAL DEVELOPMENT ONLY
#
# Runs Kanboard + Gitea on a single machine alongside a locally-running
# Marcus instance.  Not intended for production — use the individual
# compose files instead:
#
#   kanboard/docker-compose.yml  →  deploy Kanboard (e.g. Railway)
#   gitea/docker-compose.yml     →  deploy Gitea    (e.g. VPS / cloud VM)
#
# Quick start
# -----------
#   docker compose up -d
#
#   # Gitea boots in seconds — it's a single lightweight Go binary with an
#   # embedded SQLite database, unlike GitLab CE's multi-minute Rails boot:
#   docker compose logs -f gitea | grep "Listen"
#
# The MarcusDevEnv plugin is bind-mounted from kanboard/plugins/ so any
# edits to the PHP templates take effect after a container restart:
#   docker compose restart kanboard
#
# One-time Gitea admin setup (INSTALL_LOCK skips the web installer wizard,
# so there is no default admin account yet):
#   docker compose exec -u git gitea gitea admin user create \
#     --username root --password Marcus123! \
#     --email root@example.com --admin --must-change-password=false
#
# Configure Marcus (run locally, not in Docker):
#   export KANBOARD_URL=http://localhost:8080/jsonrpc.php
#   export KANBOARD_API_TOKEN=<token from Kanboard → Settings → API>
#   export KANBOARD_PROJECT_ID=1
#   export GITEA_URL=http://localhost:3000
#   export GITEA_TOKEN=<token from Gitea → Settings → Applications>
#   export MARCUS_URL=http://localhost:4298
#   export KANBOARD_WEBHOOK_TOKEN=<shared secret, optional>

services:
  kanboard:
    image: kanboard/kanboard:latest
    container_name: marcus-kanboard
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - kanboard_data:/var/www/app/data
      # Bind-mount the plugin from source so edits are immediately testable
      - ./kanboard/plugins:/var/www/app/plugins
    environment:
      MARCUS_URL: "${MARCUS_URL:-http://host.docker.internal:4298}"
      KANBOARD_WEBHOOK_TOKEN: "${KANBOARD_WEBHOOK_TOKEN:-}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  gitea:
    image: gitea/gitea:latest
    container_name: marcus-gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__DOMAIN: localhost
      GITEA__server__ROOT_URL: "http://localhost:3000/"
      GITEA__service__DISABLE_REGISTRATION: "true"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/version"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  kanboard_data:
  gitea_data:
