services:
  # Kanboard task management board
  kanboard:
    image: kanboard/kanboard:latest
    container_name: marcus-kanboard
    ports:
      - "8080:80"
    volumes:
      - kanboard_data:/var/www/app/data
      - kanboard_plugins:/var/www/app/plugins
    environment:
      # Optional: validate that incoming webhooks carry this token
      # Must match KANBOARD_WEBHOOK_TOKEN in your Marcus env vars
      KANBOARD_WEBHOOK_TOKEN: ""
    restart: unless-stopped

  # GitLab CE - self-hosted Git + CI/CD
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: marcus-gitlab
    hostname: localhost
    ports:
      - "8929:80"   # HTTP web UI + git clone
      - "2289:22"   # SSH git push
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2289
        gitlab_rails['initial_root_password'] = 'Marcus123!'
    shm_size: '256m'
    restart: unless-stopped

volumes:
  kanboard_data:
  kanboard_plugins:
  gitlab_config:
  gitlab_logs:
  gitlab_data:

# Usage:
# ======
#
# Start the stack:
#   docker compose up -d
#
# First boot: Kanboard is ready in ~5s.
# GitLab takes 3-10 minutes on first boot — wait until:
#   docker compose logs -f gitlab | grep "GitLab is ready to serve"
#
# Access:
#   - Kanboard:  http://localhost:8080  (admin / admin)
#   - GitLab:    http://localhost:8929  (root / Marcus123!)
#
# First-time Kanboard setup:
#   1. Log in at http://localhost:8080 (admin / admin)
#   2. Settings → API → copy API token
#   3. Settings → Integrations → Webhook URL:
#         http://host.docker.internal:4298/webhooks/kanboard
#      (Kanboard is in Docker; host.docker.internal reaches Marcus on your Mac)
#   4. Create a project and add columns:
#         Ready, In Progress, Waiting for Human, Blocked, Done
#   5. (Optional) Install the MarcusDevEnv plugin:
#         copy kanboard-plugins/MarcusDevEnv/ into the Kanboard plugins volume
#         and restart: docker compose restart kanboard
#
# First-time GitLab setup:
#   1. Visit http://localhost:8929 — log in as root / Marcus123!
#   2. Edit Profile → Access Tokens → create token with api + write_repository scopes
#
# Configure Marcus env vars:
#   export KANBOARD_URL=http://localhost:8080/jsonrpc.php
#   export KANBOARD_API_TOKEN=<your-token>
#   export KANBOARD_PROJECT_ID=1
#   export GITLAB_URL=http://localhost:8929
#   export GITLAB_TOKEN=<your-pat>
#   export MARCUS_URL=http://localhost:4298   # used by the MarcusDevEnv plugin
#
# Note: Marcus and Cato run locally (not in Docker) because agents
# write to the local filesystem. Docker is only for infrastructure.
